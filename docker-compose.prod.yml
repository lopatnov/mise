# Production deployment.
#
# Setup (first time):
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Update to a new release:
#   git pull
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Stop (data is preserved):
#   docker compose -f docker-compose.prod.yml down
#
# Full wipe including database:
#   docker compose -f docker-compose.prod.yml down -v

services:
  mongodb:
    image: mongo:8
    container_name: mise-mongodb
    # No external port — only reachable by other containers in this Compose project.
    volumes:
      - mise_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mise
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: mise-api
    # No external port — nginx proxies /api/* and /uploads/* internally
    depends_on:
      mongodb:
        condition: service_healthy
    env_file: .env.prod
    environment:
      MONGODB_URI: mongodb://mongodb:27017/mise
      PORT: 3000
    volumes:
      # Uploads stored on host for easy backup: cp -r ./data/uploads /backup/
      - ./data/uploads:/app/uploads
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ""      # empty → relative /api calls → nginx proxies
    container_name: mise-web
    ports:
      - "80:80"  # HOST:CONTAINER — change the first 80 to your port if needed
    depends_on:
      - api
    restart: unless-stopped

volumes:
  mise_mongo_data:
    # MongoDB data lives in a Docker-managed named volume.
    # To back up: docker run --rm -v mise_mongo_data:/data/db -v $(pwd)/backup:/backup mongo:8 mongodump --out /backup
    # To restore: docker run --rm -v mise_mongo_data:/data/db -v $(pwd)/backup:/backup mongo:8 mongorestore /backup
