# Production deployment.
#
# Setup (first time):
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Update to a new release:
#   git pull
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Stop (data is preserved):
#   docker compose -f docker-compose.prod.yml down
#
# Full wipe including database:
#   docker compose -f docker-compose.prod.yml down -v

services:
  mongodb:
    image: mongo:8
    container_name: mise-mongodb
    # No external port — only reachable by other containers in this Compose project.
    volumes:
      - mise_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mise
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
    container_name: mise-api
    # No external port — nginx proxies /api/* and /uploads/* internally
    depends_on:
      mongodb:
        condition: service_healthy
    env_file: .env.prod
    environment:
      MONGODB_URI: mongodb://mongodb:27017/mise
      PORT: 3000
    volumes:
      # Uploads stored on host for easy backup: cp -r ./data/uploads /backup/
      - ./data/uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ""      # empty → relative /api calls → nginx proxies
    container_name: mise-web
    ports:
      - "80:80"  # HOST:CONTAINER — change the first 80 to your port if needed
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  db-backup:
    image: mongo:8
    container_name: mise-db-backup
    entrypoint: ["/bin/bash", "-c"]
    command: |
      while true; do
        STAMP=$$(date +%Y%m%d_%H%M%S)
        mongodump --host=mongodb:27017 --db=mise --out=/backups/mise_$${STAMP} \
          && echo "[backup] mise_$${STAMP} written" \
          || echo "[backup] Failed at $${STAMP}, will retry in 24h"
        find /backups -maxdepth 1 -type d -name "mise_*" -mtime +7 -exec rm -rf {} +
        sleep 86400
      done
    volumes:
      - mise_mongo_backups:/backups
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mise_mongo_data:
  mise_mongo_backups:
    # Daily mongodump backups, retained for 7 days.
    # To restore a backup: docker run --rm \
    #   -v mise_mongo_backups:/backups -v mise_mongo_data:/data/db \
    #   mongo:8 mongorestore --host=mongodb:27017 /backups/mise_<STAMP>
