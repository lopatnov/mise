# Development: starts MongoDB only.
# API and frontend run locally with hot-reload (see README).
#
# For production use docker-compose.prod.yml:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  mongodb:
    image: mongo:8
    container_name: mise-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mise_mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: mise
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mise_mongo_data:
    # Named volume — data persists across `docker compose down`.
    # Deleted only with `docker compose down -v` (explicit wipe).
    # Location on host: managed by Docker (see `docker volume inspect mise_mongo_data`).
