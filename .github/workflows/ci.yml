name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  api:
    name: API — lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017

    env:
      MONGODB_URI: mongodb://localhost:27017/mise-test
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1h
      PORT: 3001

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

  web:
    name: Web — lint, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check locale completeness
        run: npm run check:locales

      - name: Build
        run: npm run build
