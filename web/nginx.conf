upstream api_backend {
    server api:3000;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; object-src 'none';" always;

    # Proxy robots.txt and sitemap.xml to NestJS (dynamic, domain-aware)
    location ~ ^/(robots\.txt|sitemap\.xml)$ {
        proxy_pass http://api_backend/$uri;
        proxy_set_header Host $host;
    }

    # Proxy API calls to NestJS
    location /api/ {
        proxy_pass http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy uploads (NestJS ServeStaticModule)
    location /uploads/ {
        proxy_pass http://api_backend/uploads/;
        proxy_set_header Host $host;
    }

    # SPA routing — everything else serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}

